name: Build APK

on:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"


    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          python3-pip \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libffi-dev \
          libssl-dev


    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install buildozer
        pip install cython==0.29.33


    - name: Check project files
      run: |
        ls
        ls Mohadeseh_Gym_App
        ls Mohadeseh_Gym_App/assets
        ls Mohadeseh_Gym_App/data


    - name: Build APK
      run: |
        buildozer -v android debug


    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Mohadeseh-Gym-APK
        path: bin/*.apk
