name: Build APK

on:
  push:
    branches:
      - main
  workflow_dispatch:


jobs:
  build:

    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"


    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"


    - name: Install system packages
      run: |
        sudo apt update

        sudo apt install -y \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          python3-pip \
          build-essential \
          libffi-dev \
          libssl-dev \
          libncurses5-dev \
          libncursesw5-dev \
          cmake


    - name: Install Buildozer
      run: |
        pip install --upgrade pip
        pip install cython==0.29.33
        pip install buildozer


    - name: Check project files
      run: |
        ls
        cd Mohadeseh_Gym_App
        ls


    - name: Build APK
      run: |
        cd Mohadeseh_Gym_App
        yes | buildozer -v android debug


    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Mohadeseh-Gym-APK
        path: Mohadeseh_Gym_App/bin/*.apk
