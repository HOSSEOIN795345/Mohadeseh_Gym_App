name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: "17"

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          build-essential \
          git \
          zip \
          unzip \
          openjdk-17-jdk \
          python3-pip \
          autoconf \
          libtool \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libffi-dev \
          libssl-dev

    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip
        pip install cython==0.29.33
        pip install buildozer

    - name: Check project
      run: |
        ls
        ls Mohadeseh_Gym_App

    - name: Clean old build
      run: |
        rm -rf .buildozer

    - name: Accept Android licenses
      run: |
        yes | sdkmanager --licenses || true

    - name: Build APK
      run: |
        yes | buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Mohadeseh-Gym-APK
        path: bin/*.apk
